<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafeGuard 食品安全检测系统</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0e1a;
  --bg-deep: #060912;
  --card: #1a1f35;
  --card-hover: #222845;
  --primary: #00d4aa;
  --primary-dim: rgba(0,212,170,0.12);
  --danger: #ff4757;
  --danger-dim: rgba(255,71,87,0.12);
  --warning: #ffa502;
  --text: #e0e6f0;
  --text-dim: #7a8599;
  --border: #252b47;
  --border-light: #32385a;
  --font-title: 'Orbitron', sans-serif;
  --font-body: 'Noto Sans SC', sans-serif;
}
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  overflow-x: hidden;
  min-height: 100vh;
}

/* ========== Scrollbar ========== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--primary); }

/* ========== Navbar ========== */
.navbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  height: 60px;
  background: rgba(10,14,26,0.92);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
}
.navbar-brand {
  display: flex; align-items: center; gap: 12px;
}
.navbar-logo {
  font-family: var(--font-title);
  font-size: 1.15rem;
  font-weight: 700;
  letter-spacing: 1px;
  color: var(--primary);
}
.navbar-logo span { color: #fff; font-weight: 400; }
.navbar-status {
  display: flex; align-items: center; gap: 20px;
}
.status-indicator {
  display: flex; align-items: center; gap: 8px;
  font-size: 0.82rem; color: var(--text-dim);
}
.status-dot {
  width: 10px; height: 10px; border-radius: 50%;
  transition: all .3s;
}
.status-dot.connected {
  background: var(--primary);
  box-shadow: 0 0 8px var(--primary), 0 0 20px rgba(0,212,170,.3);
  animation: pulse-dot 2s ease infinite;
}
.status-dot.disconnected {
  background: var(--danger);
  box-shadow: 0 0 8px var(--danger);
}
@keyframes pulse-dot {
  0%, 100% { box-shadow: 0 0 8px var(--primary), 0 0 20px rgba(0,212,170,.3); }
  50% { box-shadow: 0 0 12px var(--primary), 0 0 32px rgba(0,212,170,.5); }
}
.btn-settings {
  width: 36px; height: 36px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .3s;
  font-size: 1.1rem;
}
.btn-settings:hover {
  border-color: var(--primary);
  color: var(--primary);
  background: var(--primary-dim);
}

/* ========== Main Layout ========== */
.main-container {
  padding-top: 76px;
  min-height: 100vh;
  display: grid;
  grid-template-columns: 320px 1fr;
  gap: 24px;
  padding-left: 24px;
  padding-right: 24px;
  padding-bottom: 24px;
}

/* ========== Left Panel ========== */
.left-panel {
  display: flex; flex-direction: column; gap: 18px;
}

/* Upload Area */
.upload-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  transition: all .3s;
}
.upload-area {
  border: 2px dashed var(--border-light);
  border-radius: 12px;
  padding: 36px 20px;
  text-align: center;
  cursor: pointer;
  transition: all .3s;
  position: relative;
  overflow: hidden;
}
.upload-area:hover, .upload-area.dragover {
  border-color: var(--primary);
  background: var(--primary-dim);
}
.upload-area.dragover { transform: scale(1.01); }
.upload-icon {
  font-size: 2.4rem;
  margin-bottom: 12px;
  display: block;
}
.upload-text {
  font-size: 0.92rem;
  color: var(--text-dim);
  margin-bottom: 6px;
}
.upload-hint {
  font-size: 0.78rem;
  color: var(--text-dim);
  opacity: 0.6;
}
#file-input { display: none; }
.preview-thumb {
  max-width: 100%;
  max-height: 180px;
  border-radius: 8px;
  margin-top: 12px;
  display: none;
}
.preview-thumb.visible { display: block; }

/* Controls */
.control-group {
  margin-top: 16px;
}
.control-label {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 0.85rem; color: var(--text-dim);
  margin-bottom: 8px;
}
.control-value {
  font-family: var(--font-title);
  font-size: 0.82rem;
  color: var(--primary);
}
.slider-wrapper {
  position: relative;
  padding: 4px 0;
}
input[type="range"] {
  width: 100%;
  height: 6px;
  -webkit-appearance: none;
  appearance: none;
  background: var(--border);
  border-radius: 3px;
  outline: none;
  cursor: pointer;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--primary);
  cursor: pointer;
  box-shadow: 0 0 10px rgba(0,212,170,.4);
  transition: transform .2s;
}
input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.15); }

/* Buttons */
.btn-group {
  display: flex; flex-direction: column; gap: 10px;
  margin-top: 18px;
}
.btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  font-family: var(--font-body);
  font-size: 0.9rem; font-weight: 500;
  padding: 12px 20px;
  border-radius: 10px;
  border: none; cursor: pointer;
  transition: all .3s;
  white-space: nowrap;
}
.btn-primary {
  background: linear-gradient(135deg, var(--primary), #00f5d4);
  color: #0a0e1a;
  font-weight: 600;
  box-shadow: 0 4px 16px rgba(0,212,170,.25);
}
.btn-primary:hover:not(:disabled) {
  transform: translateY(-1px);
  box-shadow: 0 6px 24px rgba(0,212,170,.35);
}
.btn-primary:disabled {
  opacity: 0.5; cursor: not-allowed;
}
.btn-secondary {
  background: var(--card);
  color: var(--text);
  border: 1px solid var(--border);
}
.btn-secondary:hover {
  border-color: var(--primary);
  color: var(--primary);
  background: var(--primary-dim);
}
.btn-danger {
  background: var(--danger-dim);
  color: var(--danger);
  border: 1px solid rgba(255,71,87,.3);
}
.btn-danger:hover {
  background: rgba(255,71,87,.2);
  border-color: var(--danger);
}
.btn-camera {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: #fff;
  font-weight: 500;
}
.btn-camera:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(102,126,234,.35);
}
.btn-sm {
  padding: 8px 14px;
  font-size: 0.82rem;
  border-radius: 8px;
}

/* Video Input */
.video-input-wrap {
  display: none;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}
.video-input-wrap.active { display: block; }
.video-file-info {
  display: flex; align-items: center; gap: 8px;
  font-size: 0.82rem; color: var(--text-dim);
  margin-top: 8px;
}

/* ========== Right Panel ========== */
.right-panel {
  display: flex; flex-direction: column; gap: 18px;
}

/* Alert Banner */
.alert-banner {
  display: none;
  background: linear-gradient(135deg, rgba(255,71,87,.15), rgba(255,71,87,.05));
  border: 1px solid rgba(255,71,87,.3);
  border-radius: 12px;
  padding: 14px 20px;
  align-items: center; gap: 12px;
  animation: alert-shake .5s ease;
}
.alert-banner.visible { display: flex; }
.alert-icon { font-size: 1.4rem; flex-shrink: 0; }
.alert-text { font-size: 0.92rem; font-weight: 500; color: var(--danger); }
.alert-count {
  font-family: var(--font-title);
  font-size: 1rem;
  color: var(--danger);
  font-weight: 700;
}
@keyframes alert-shake {
  0%, 100% { transform: translateX(0); }
  20%, 60% { transform: translateX(-6px); }
  40%, 80% { transform: translateX(6px); }
}

/* Result Card */
.result-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
}
.result-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
.result-title {
  font-family: var(--font-title);
  font-size: 0.88rem;
  letter-spacing: 1px;
  color: var(--primary);
}
.result-time {
  font-size: 0.78rem; color: var(--text-dim);
}
.result-image-wrap {
  padding: 20px;
  display: flex; align-items: center; justify-content: center;
  min-height: 300px;
  background: repeating-conic-gradient(var(--bg) 0% 25%, var(--bg-deep) 0% 50%) 50% / 20px 20px;
}
.result-image {
  max-width: 100%;
  max-height: 450px;
  border-radius: 8px;
  object-fit: contain;
  display: none;
}
.result-image.visible { display: block; }
.result-placeholder {
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  color: var(--text-dim);
}
.result-placeholder.hidden { display: none; }
.placeholder-icon { font-size: 3rem; opacity: .4; }

/* Stats Cards */
.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  padding: 16px 20px;
  border-top: 1px solid var(--border);
}
.stat-item {
  text-align: center;
  padding: 14px 10px;
  border-radius: 10px;
  transition: all .3s;
}
.stat-item.hat-stat { background: var(--primary-dim); }
.stat-item.nohat-stat { background: var(--danger-dim); }
.stat-item.total-stat { background: rgba(255,165,2,.08); }
.stat-number {
  font-family: var(--font-title);
  font-size: 1.6rem;
  font-weight: 900;
}
.stat-item.hat-stat .stat-number { color: var(--primary); }
.stat-item.nohat-stat .stat-number { color: var(--danger); }
.stat-item.total-stat .stat-number { color: var(--warning); }
.stat-label { font-size: 0.75rem; color: var(--text-dim); margin-top: 4px; }

/* Detections List */
.detections-list {
  padding: 0 20px 20px;
  max-height: 280px;
  overflow-y: auto;
}
.detection-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px;
  border-radius: 10px;
  margin-bottom: 8px;
  transition: all .3s;
  animation: fadeSlideIn .3s ease;
}
.detection-item.hat {
  background: var(--primary-dim);
  border-left: 3px solid var(--primary);
}
.detection-item.nohat {
  background: var(--danger-dim);
  border-left: 3px solid var(--danger);
}
@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateX(-10px); }
  to { opacity: 1; transform: translateX(0); }
}
.det-icon {
  width: 34px; height: 34px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem;
  flex-shrink: 0;
}
.detection-item.hat .det-icon { background: rgba(0,212,170,.2); }
.detection-item.nohat .det-icon { background: rgba(255,71,87,.2); }
.det-info { flex: 1; min-width: 0; }
.det-class {
  font-size: 0.88rem; font-weight: 600;
}
.detection-item.hat .det-class { color: var(--primary); }
.detection-item.nohat .det-class { color: var(--danger); }
.det-conf {
  font-size: 0.78rem; color: var(--text-dim);
  font-family: var(--font-title);
}
.det-tag {
  font-size: 0.72rem;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 999px;
  flex-shrink: 0;
}
.tag-normal { background: var(--primary); color: #0a0e1a; }
.tag-abnormal { background: var(--danger); color: #fff; }

/* Empty State */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-dim);
}
.empty-state.hidden { display: none; }
.empty-icon { font-size: 2.5rem; margin-bottom: 10px; opacity: .4; }
.empty-text { font-size: 0.88rem; }

/* Loading Overlay */
.loading-overlay {
  display: none;
  position: absolute; inset: 0;
  background: rgba(10,14,26,.8);
  backdrop-filter: blur(4px);
  z-index: 10;
  border-radius: 16px;
  align-items: center; justify-content: center;
  flex-direction: column; gap: 16px;
}
.loading-overlay.active { display: flex; }
.spinner {
  width: 44px; height: 44px;
  border: 3px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 0.88rem; color: var(--primary); }

/* ========== History Section ========== */
.history-section {
  grid-column: 1 / -1;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
}
.history-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
.history-title {
  font-family: var(--font-title);
  font-size: 0.88rem;
  letter-spacing: 1px;
  color: var(--primary);
}
.history-filters { display: flex; gap: 8px; }
.filter-btn {
  font-size: 0.76rem;
  padding: 5px 12px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  transition: all .2s;
  font-family: var(--font-body);
}
.filter-btn.active, .filter-btn:hover {
  border-color: var(--primary);
  color: var(--primary);
  background: var(--primary-dim);
}
.history-list {
  max-height: 300px;
  overflow-y: auto;
}
.history-item {
  display: flex; align-items: center; gap: 14px;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  transition: background .2s;
  cursor: pointer;
}
.history-item:last-child { border-bottom: none; }
.history-item:hover { background: rgba(255,255,255,.02); }
.hist-type-icon {
  width: 32px; height: 32px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.9rem;
  flex-shrink: 0;
}
.hist-type-icon.image { background: var(--primary-dim); }
.hist-type-icon.camera { background: rgba(102,126,234,.15); }
.hist-type-icon.video { background: rgba(255,165,2,.12); }
.hist-info { flex: 1; min-width: 0; }
.hist-name {
  font-size: 0.84rem;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.hist-meta {
  font-size: 0.74rem; color: var(--text-dim);
  display: flex; gap: 12px; margin-top: 2px;
}
.hist-stats {
  display: flex; gap: 8px;
  flex-shrink: 0;
}
.hist-stat-badge {
  font-size: 0.7rem;
  padding: 2px 8px;
  border-radius: 999px;
  font-family: var(--font-title);
}
.badge-hat { background: var(--primary-dim); color: var(--primary); }
.badge-nohat { background: var(--danger-dim); color: var(--danger); }
.hist-alert-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--danger);
  flex-shrink: 0;
  box-shadow: 0 0 6px var(--danger);
}
.no-history {
  text-align: center;
  padding: 40px;
  color: var(--text-dim);
  font-size: 0.88rem;
}

/* ========== Settings Modal ========== */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.65);
  backdrop-filter: blur(6px);
  z-index: 2000;
  align-items: center; justify-content: center;
  animation: fadeIn .2s ease;
}
.modal-overlay.active { display: flex; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 18px;
  width: 420px;
  max-width: 90vw;
  padding: 28px;
  animation: modalSlideIn .3s ease;
}
@keyframes modalSlideIn {
  from { opacity: 0; transform: translateY(-20px) scale(.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.modal-title {
  font-family: var(--font-title);
  font-size: 1rem;
  letter-spacing: 1px;
  margin-bottom: 24px;
  color: #fff;
  display: flex; align-items: center; gap: 10px;
}
.modal-field { margin-bottom: 18px; }
.modal-field label {
  display: block;
  font-size: 0.84rem;
  color: var(--text-dim);
  margin-bottom: 8px;
}
.modal-field input {
  width: 100%;
  padding: 11px 14px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 0.9rem;
  outline: none;
  transition: border-color .3s;
}
.modal-field input:focus { border-color: var(--primary); }
.modal-actions {
  display: flex; gap: 10px;
  margin-top: 24px;
}
.test-result {
  margin-top: 12px;
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 0.84rem;
  display: none;
}
.test-result.success {
  display: block;
  background: var(--primary-dim);
  color: var(--primary);
  border: 1px solid rgba(0,212,170,.2);
}
.test-result.error {
  display: block;
  background: var(--danger-dim);
  color: var(--danger);
  border: 1px solid rgba(255,71,87,.2);
}

/* ========== Camera Modal ========== */
.camera-modal {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.85);
  z-index: 2000;
  align-items: center; justify-content: center;
  flex-direction: column; gap: 20px;
}
.camera-modal.active { display: flex; }
.camera-view {
  position: relative;
  border-radius: 16px;
  overflow: hidden;
  border: 2px solid var(--border);
}
#camera-video {
  display: block;
  max-width: 80vw;
  max-height: 60vh;
  border-radius: 14px;
}
#camera-canvas { display: none; }
.camera-preview-img {
  max-width: 80vw;
  max-height: 60vh;
  border-radius: 14px;
  display: none;
}
.camera-controls {
  display: flex; gap: 12px;
}
.camera-btn-capture {
  width: 64px; height: 64px;
  border-radius: 50%;
  background: var(--primary);
  border: 4px solid rgba(255,255,255,.3);
  color: #0a0e1a;
  font-size: 1.4rem;
  cursor: pointer;
  transition: all .3s;
  display: flex; align-items: center; justify-content: center;
}
.camera-btn-capture:hover {
  transform: scale(1.08);
  box-shadow: 0 0 24px rgba(0,212,170,.5);
}
.camera-btn-close {
  padding: 10px 24px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text);
  cursor: pointer;
  font-family: var(--font-body);
  font-size: 0.9rem;
  transition: all .3s;
}
.camera-btn-close:hover {
  border-color: var(--danger);
  color: var(--danger);
}
.camera-btn-detect {
  display: none;
  padding: 10px 28px;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--primary), #00f5d4);
  color: #0a0e1a;
  font-weight: 600;
  border: none;
  cursor: pointer;
  font-family: var(--font-body);
  font-size: 0.9rem;
  transition: all .3s;
}
.camera-btn-detect.visible { display: inline-flex; align-items: center; gap: 8px; }
.camera-btn-detect:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,212,170,.35); }

/* ========== Toast ========== */
.toast-container {
  position: fixed; bottom: 24px; right: 24px;
  z-index: 3000;
  display: flex; flex-direction: column; gap: 8px;
}
.toast {
  padding: 12px 20px;
  border-radius: 10px;
  font-size: 0.86rem;
  animation: toastIn .3s ease, toastOut .3s ease 2.7s forwards;
  max-width: 360px;
}
.toast.success { background: var(--primary-dim); color: var(--primary); border: 1px solid rgba(0,212,170,.2); }
.toast.error { background: var(--danger-dim); color: var(--danger); border: 1px solid rgba(255,71,87,.2); }
.toast.info { background: rgba(102,126,234,.12); color: #8b9cf0; border: 1px solid rgba(102,126,234,.2); }
@keyframes toastIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
@keyframes toastOut { from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateX(30px); } }

/* ========== Responsive ========== */
@media (max-width: 900px) {
  .main-container {
    grid-template-columns: 1fr;
    padding: 76px 16px 16px;
  }
  .left-panel { max-width: 100%; }
  .stats-row { grid-template-columns: repeat(3, 1fr); }
}
@media (max-width: 520px) {
  .navbar { padding: 0 16px; }
  .navbar-logo { font-size: 0.95rem; }
  .stats-row { grid-template-columns: 1fr 1fr; }
  .stat-item.total-stat { grid-column: span 2; }
  .history-filters { flex-wrap: wrap; }
  .modal-box { padding: 20px; }
}
</style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <div class="navbar-brand">
    <div class="navbar-logo">SafeGuard<span>食品安全检测</span></div>
  </div>
  <div class="navbar-status">
    <div class="status-indicator">
      <div class="status-dot disconnected" id="statusDot"></div>
      <span id="statusText">未连接</span>
    </div>
    <button class="btn-settings" id="btnSettings" title="设置">⚙️</button>
  </div>
</nav>

<!-- Main Container -->
<div class="main-container">

  <!-- Left Panel -->
  <div class="left-panel">

    <!-- Upload Card -->
    <div class="upload-card">
      <div class="upload-area" id="uploadArea">
        <span class="upload-icon">📤</span>
        <div class="upload-text">拖拽图片到此处或点击上传</div>
        <div class="upload-hint">支持 JPG / PNG / BMP 格式</div>
        <img class="preview-thumb" id="previewThumb" alt="预览">
        <input type="file" id="fileInput" accept="image/*">
      </div>

      <!-- Video Upload -->
      <div class="video-input-wrap" id="videoInputWrap">
        <label style="font-size:.84rem;color:var(--text-dim);display:flex;align-items:center;gap:6px;">
          🎬 视频文件：
          <input type="file" id="videoInput" accept="video/*" style="flex:1;font-size:.82rem;color:var(--text);">
        </label>
        <div class="video-file-info" id="videoFileInfo"></div>
      </div>

      <!-- Confidence Slider -->
      <div class="control-group">
        <div class="control-label">
          <span>置信度阈值</span>
          <span class="control-value" id="confValue">0.25</span>
        </div>
        <div class="slider-wrapper">
          <input type="range" id="confSlider" min="0.1" max="0.9" step="0.05" value="0.25">
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="btn-group">
        <button class="btn btn-primary" id="btnDetect" disabled>
          🔍 开始检测
        </button>
        <button class="btn btn-secondary btn-sm" id="btnToggleVideo">
          🎬 切换视频模式
        </button>
        <button class="btn btn-camera btn-sm" id="btnCamera">
          📷 摄像头拍照
        </button>
      </div>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="right-panel">

    <!-- Alert Banner -->
    <div class="alert-banner" id="alertBanner">
      <span class="alert-icon">🚨</span>
      <span class="alert-text">检测到 <span class="alert-count" id="alertCount">0</span> 名未佩戴帽子的人员！</span>
    </div>

    <!-- Result Card -->
    <div class="result-card" style="position:relative;">
      <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text" id="loadingText">正在检测中...</div>
      </div>

      <div class="result-header">
        <span class="result-title">DETECTION RESULT</span>
        <span class="result-time" id="resultTime"></span>
      </div>

      <div class="result-image-wrap">
        <img class="result-image" id="resultImage" alt="检测结果">
        <div class="result-placeholder" id="resultPlaceholder">
          <span class="placeholder-icon">🎯</span>
          <span>上传图片或使用摄像头开始检测</span>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats-row">
        <div class="stat-item hat-stat">
          <div class="stat-number" id="statHat">0</div>
          <div class="stat-label">佩戴帽子</div>
        </div>
        <div class="stat-item nohat-stat">
          <div class="stat-number" id="statNohat">0</div>
          <div class="stat-label">未戴帽子</div>
        </div>
        <div class="stat-item total-stat">
          <div class="stat-number" id="statTotal">0</div>
          <div class="stat-label">总计</div>
        </div>
      </div>

      <!-- Detections List -->
      <div class="detections-list" id="detectionsList">
        <div class="empty-state" id="emptyDetections">
          <div class="empty-icon">📋</div>
          <div class="empty-text">暂无检测结果</div>
        </div>
      </div>
    </div>

    <!-- History Section -->
    <div class="history-section">
      <div class="history-header">
        <span class="history-title">DETECTION HISTORY</span>
        <div class="history-filters">
          <button class="filter-btn active" data-filter="">全部</button>
          <button class="filter-btn" data-filter="image">图片</button>
          <button class="filter-btn" data-filter="camera">摄像头</button>
          <button class="filter-btn" data-filter="video">视频</button>
        </div>
      </div>
      <div class="history-list" id="historyList">
        <div class="no-history">暂无检测记录</div>
      </div>
    </div>

  </div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal-box">
    <div class="modal-title">⚙️ 系统设置</div>
    <div class="modal-field">
      <label>后端 API 地址</label>
      <input type="text" id="apiUrlInput" placeholder="http://127.0.0.1:5000">
    </div>
    <div class="test-result" id="testResult"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary btn-sm" id="btnTestConn" style="flex:1;">测试连接</button>
      <button class="btn btn-primary btn-sm" id="btnSaveSettings" style="flex:1;">保存设置</button>
    </div>
  </div>
</div>

<!-- Camera Modal -->
<div class="camera-modal" id="cameraModal">
  <div class="camera-view">
    <video id="cameraVideo" autoplay playsinline></video>
    <canvas id="cameraCanvas"></canvas>
    <img class="camera-preview-img" id="cameraPreviewImg" alt="拍摄预览">
  </div>
  <div class="camera-controls">
    <button class="camera-btn-capture" id="btnCapture">📸</button>
    <button class="camera-btn-close" id="btnCloseCamera">关闭</button>
    <button class="camera-btn-detect" id="btnCameraDetect">🔍 检测此照片</button>
  </div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<script>
(function() {
  // ===== State =====
  let apiUrl = localStorage.getItem('safeguard_api_url') || 'http://127.0.0.1:5000';
  let isConnected = false;
  let selectedFile = null;
  let selectedVideoFile = null;
  let isVideoMode = false;
  let cameraStream = null;
  let capturedBase64 = null;
  let currentHistoryFilter = '';
  let statusInterval = null;

  // ===== DOM Elements =====
  const $ = s => document.querySelector(s);
  const $$ = s => document.querySelectorAll(s);

  const statusDot = $('#statusDot');
  const statusText = $('#statusText');
  const uploadArea = $('#uploadArea');
  const fileInput = $('#fileInput');
  const previewThumb = $('#previewThumb');
  const confSlider = $('#confSlider');
  const confValue = $('#confValue');
  const btnDetect = $('#btnDetect');
  const btnToggleVideo = $('#btnToggleVideo');
  const btnCamera = $('#btnCamera');
  const videoInputWrap = $('#videoInputWrap');
  const videoInput = $('#videoInput');
  const videoFileInfo = $('#videoFileInfo');

  const alertBanner = $('#alertBanner');
  const alertCount = $('#alertCount');
  const loadingOverlay = $('#loadingOverlay');
  const loadingText = $('#loadingText');
  const resultImage = $('#resultImage');
  const resultPlaceholder = $('#resultPlaceholder');
  const resultTime = $('#resultTime');
  const statHat = $('#statHat');
  const statNohat = $('#statNohat');
  const statTotal = $('#statTotal');
  const detectionsList = $('#detectionsList');
  const emptyDetections = $('#emptyDetections');
  const historyList = $('#historyList');

  const settingsModal = $('#settingsModal');
  const apiUrlInput = $('#apiUrlInput');
  const testResult = $('#testResult');
  const btnSettings = $('#btnSettings');
  const btnTestConn = $('#btnTestConn');
  const btnSaveSettings = $('#btnSaveSettings');

  const cameraModal = $('#cameraModal');
  const cameraVideo = $('#cameraVideo');
  const cameraCanvas = $('#cameraCanvas');
  const cameraPreviewImg = $('#cameraPreviewImg');
  const btnCapture = $('#btnCapture');
  const btnCloseCamera = $('#btnCloseCamera');
  const btnCameraDetect = $('#btnCameraDetect');
  const toastContainer = $('#toastContainer');

  // ===== Initialize =====
  function init() {
    apiUrlInput.value = apiUrl;
    confSlider.addEventListener('input', () => {
      confValue.textContent = parseFloat(confSlider.value).toFixed(2);
    });

    // Upload events
    uploadArea.addEventListener('click', e => {
      if (e.target === uploadArea || e.target.closest('.upload-text') || e.target.closest('.upload-hint') || e.target.closest('.upload-icon')) {
        fileInput.click();
      }
    });
    uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
    uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
    uploadArea.addEventListener('drop', handleDrop);
    fileInput.addEventListener('change', handleFileSelect);

    // Video input
    videoInput.addEventListener('change', handleVideoSelect);

    // Buttons
    btnDetect.addEventListener('click', runDetection);
    btnToggleVideo.addEventListener('click', toggleVideoMode);
    btnCamera.addEventListener('click', openCamera);
    btnSettings.addEventListener('click', () => settingsModal.classList.add('active'));
    btnSaveSettings.addEventListener('click', saveSettings);
    btnTestConn.addEventListener('click', testConnection);

    // Close modals on overlay click
    settingsModal.addEventListener('click', e => { if (e.target === settingsModal) settingsModal.classList.remove('active'); });

    // Camera controls
    btnCapture.addEventListener('click', capturePhoto);
    btnCloseCamera.addEventListener('click', closeCamera);
    btnCameraDetect.addEventListener('click', detectCapturedPhoto);

    // History filters
    $$('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        $$('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentHistoryFilter = btn.dataset.filter;
        loadHistory();
      });
    });

    // Check status on load & every 10s
    checkStatus();
    statusInterval = setInterval(checkStatus, 10000);
    loadHistory();
  }

  // ===== Connection Status =====
  async function checkStatus() {
    try {
      const res = await fetch(apiUrl + '/api/status', { signal: AbortSignal.timeout(5000) });
      if (res.ok) {
        setConnected(true);
      } else {
        setConnected(false);
      }
    } catch {
      setConnected(false);
    }
  }

  function setConnected(ok) {
    isConnected = ok;
    if (ok) {
      statusDot.className = 'status-dot connected';
      statusText.textContent = '已连接';
    } else {
      statusDot.className = 'status-dot disconnected';
      statusText.textContent = '未连接';
    }
  }

  async function testConnection() {
    testResult.className = 'test-result';
    testResult.textContent = '正在测试连接...';
    try {
      const res = await fetch(apiUrlInput.value.trim() + '/api/status', { signal: AbortSignal.timeout(8000) });
      const data = await res.json();
      if (res.ok) {
        testResult.className = 'test-result success';
        testResult.textContent = `✅ 连接成功！模型已加载，设备：${data.device || 'unknown'}，类别：${Object.values(data.classes || {}).join(', ')}`;
      } else {
        throw new Error(data.error || '连接失败');
      }
    } catch (err) {
      testResult.className = 'test-result error';
      testResult.textContent = '❌ 连接失败：' + err.message + ' — 请确保后端服务已启动';
    }
  }

  function saveSettings() {
    apiUrl = apiUrlInput.value.trim().replace(/\/+$/, '');
    if (!apiUrl) { apiUrl = 'http://127.0.0.1:5000'; apiUrlInput.value = apiUrl; }
    localStorage.setItem('safeguard_api_url', apiUrl);
    settingsModal.classList.remove('active');
    showToast('设置已保存', 'success');
    checkStatus();
  }

  // ===== File Handling =====
  function handleDrop(e) {
    e.preventDefault();
    uploadArea.classList.remove('dragover');
    const files = e.dataTransfer.files;
    if (files.length > 0 && files[0].type.startsWith('image/')) {
      processFile(files[0]);
    }
  }

  function handleFileSelect(e) {
    if (e.target.files.length > 0) {
      processFile(e.target.files[0]);
    }
  }

  function processFile(file) {
    selectedFile = file;
    isVideoMode = false;
    btnToggleVideo.textContent = '🎬 切换视频模式';
    videoInputWrap.classList.remove('active');

    const reader = new FileReader();
    reader.onload = e => {
      previewThumb.src = e.target.result;
      previewThumb.classList.add('visible');
      btnDetect.disabled = false;
    };
    reader.readAsDataURL(file);
  }

  function toggleVideoMode() {
    isVideoMode = !isVideoMode;
    if (isVideoMode) {
      btnToggleVideo.textContent = '🖼️ 切回图片模式';
      videoInputWrap.classList.add('active');
      selectedFile = null;
      previewThumb.classList.remove('visible');
      previewThumb.src = '';
      fileInput.value = '';
      btnDetect.disabled = !selectedVideoFile;
    } else {
      btnToggleVideo.textContent = '🎬 切换视频模式';
      videoInputWrap.classList.remove('active');
      btnDetect.disabled = !selectedFile;
    }
  }

  function handleVideoSelect(e) {
    if (e.target.files.length > 0) {
      selectedVideoFile = e.target.files[0];
      videoFileInfo.innerHTML = `<span>📹 ${selectedVideoFile.name}</span><span style="color:var(--text-dim)">(${(selectedVideoFile.size / 1024 / 1024).toFixed(1)} MB)</span>`;
      btnDetect.disabled = false;
    }
  }

  // ===== Detection =====
  async function runDetection() {
    if (!isConnected) {
      showToast('后端服务未连接，请检查设置', 'error');
      return;
    }

    const conf = parseFloat(confSlider.value);

    if (isVideoMode && selectedVideoFile) {
      await detectVideo(conf);
    } else if (selectedFile) {
      await detectImage(conf);
    }
  }

  async function detectImage(conf) {
    showLoading('正在分析图像...');
    try {
      const formData = new FormData();
      formData.append('image', selectedFile);
      formData.append('conf', conf);

      const res = await fetch(apiUrl + '/api/detect', {
        method: 'POST',
        body: formData
      });
      const data = await res.json();

      hideLoading();

      if (!res.ok || data.error) {
        showToast(data.error || '检测失败', 'error');
        return;
      }

      displayResult(data);
      showToast(`检测完成，耗时 ${data.inference_time || '?'}ms`, 'success');
      loadHistory();
    } catch (err) {
      hideLoading();
      showToast('请求失败：' + err.message, 'error');
    }
  }

  async function detectVideo(conf) {
    showLoading('正在处理视频（可能需要较长时间）...');
    try {
      const formData = new FormData();
      formData.append('video', selectedVideoFile);
      formData.append('conf', conf);

      const res = await fetch(apiUrl + '/api/detect_video', {
        method: 'POST',
        body: formData
      });
      const data = await res.json();

      hideLoading();

      if (!res.ok || data.error) {
        showToast(data.error || '视频检测失败', 'error');
        return;
      }

      // Display video result info
      resultPlaceholder.classList.add('hidden');
      resultImage.style.display = 'none';

      // Show stats
      statHat.textContent = data.hat_total || 0;
      statNohat.textContent = data.nohat_total || 0;
      statTotal.textContent = (data.hat_total || 0) + (data.nohat_total || 0);
      resultTime.textContent = `视频 | ${data.total_frames}帧 | ${data.processing_time || '?'}ms`;

      // Alert
      if (data.has_alert) {
        alertCount.textContent = data.nohat_total || 0;
        alertBanner.classList.add('visible');
      } else {
        alertBanner.classList.remove('visible');
      }

      // Detections list summary
      renderDetectionsFromVideo(data);

      showToast(`视频处理完成：${data.total_frames} 帧，${data.total_detections} 次检测`, 'success');
      loadHistory();
    } catch (err) {
      hideLoading();
      showToast('请求失败：' + err.message, 'error');
    }
  }

  async function detectCapturedPhoto() {
    if (!capturedBase64) return;
    if (!isConnected) {
      showToast('后端服务未连接', 'error');
      return;
    }

    const conf = parseFloat(confSlider.value);
    showLoading('正在检测摄像头照片...');

    try {
      const res = await fetch(apiUrl + '/api/detect_base64', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image: capturedBase64, conf: conf })
      });
      const data = await res.json();
      hideLoading();

      if (!res.ok || data.error) {
        showToast(data.error || '检测失败', 'error');
        return;
      }

      displayResult(data);
      showToast('摄像头照片检测完成', 'success');
      loadHistory();
    } catch (err) {
      hideLoading();
      showToast('请求失败：' + err.message, 'error');
    }
  }

  // ===== Display Results =====
  function displayResult(data) {
    resultPlaceholder.classList.add('hidden');

    // Image
    if (data.result_image) {
      resultImage.src = apiUrl + data.result_image;
      resultImage.classList.add('visible');
    }

    // Time
    resultTime.textContent = data.filename ? `${data.filename}` : '';

    // Stats
    const detections = data.detections || [];
    let h = 0, nh = 0;
    detections.forEach(d => {
      if (d.class === 'hat') h++;
      else if (d.class === 'nohat') nh++;
    });
    statHat.textContent = h;
    statNohat.textContent = nh;
    statTotal.textContent = detections.length;

    // Alert
    if (nh > 0) {
      alertCount.textContent = nh;
      alertBanner.classList.add('visible');
    } else {
      alertBanner.classList.remove('visible');
    }

    // Detections list
    renderDetections(detections);
  }

  function renderDetections(detections) {
    if (!detections || detections.length === 0) {
      emptyDetections.classList.remove('hidden');
      detectionsList.querySelectorAll('.detection-item').forEach(el => el.remove());
      return;
    }

    emptyDetections.classList.add('hidden');
    // Clear old items but keep empty-state element
    detectionsList.querySelectorAll('.detection-item').forEach(el => el.remove());

    detections.forEach((det, i) => {
      if (det.error) return;
      const isAbnormal = det.class === 'nohat';
      const item = document.createElement('div');
      item.className = `detection-item ${det.class}`;
      item.style.animationDelay = (i * 0.06) + 's';
      item.innerHTML = `
        <div class="det-icon">${isAbnormal ? '🔴' : '🟢'}</div>
        <div class="det-info">
          <div class="det-class">${det.class_cn || det.class}</div>
          <div class="det-conf">置信度 ${(det.confidence * 100).toFixed(1)}%</div>
        </div>
        <span class="det-tag ${isAbnormal ? 'tag-abnormal' : 'tag-normal'}">${isAbnormal ? '异常' : '正常'}</span>
      `;
      detectionsList.appendChild(item);
    });
  }

  function renderDetectionsFromVideo(data) {
    emptyDetections.classList.add('hidden');
    detectionsList.querySelectorAll('.detection-item').forEach(el => el.remove());

    // Show summary items
    if ((data.hat_total || 0) > 0) {
      appendSummaryItem('hat', '佩戴帽子', data.hat_total, '正常');
    }
    if ((data.nohat_total || 0) > 0) {
      appendSummaryItem('nohat', '未佩戴帽子', data.nohat_total, '异常');
    }
  }

  function appendSummaryItem(cls, label, count, tag) {
    const isAbnormal = cls === 'nohat';
    const item = document.createElement('div');
    item.className = `detection-item ${cls}`;
    item.innerHTML = `
      <div class="det-icon">${isAbnormal ? '🔴' : '🟢'}</div>
      <div class="det-info">
        <div class="det-class">${label}</div>
        <div class="det-conf">共检测到 ${count} 次</div>
      </div>
      <span class="det-tag ${isAbnormal ? 'tag-abnormal' : 'tag-normal'}">${tag}</span>
    `;
    detectionsList.appendChild(item);
  }

  // ===== History =====
  async function loadHistory() {
    try {
      let url = apiUrl + '/api/history?limit=20';
      if (currentHistoryFilter) url += '&type=' + currentHistoryFilter;

      const res = await fetch(url, { signal: AbortSignal.timeout(5000) });
      const data = await res.json();

      if (data.records && data.records.length > 0) {
        renderHistory(data.records);
      } else {
        historyList.innerHTML = '<div class="no-history">暂无检测记录</div>';
      }
    } catch {
      // Silently fail for history
    }
  }

  function renderHistory(records) {
    historyList.innerHTML = '';
    records.forEach(rec => {
      const typeIconMap = { image: '🖼️', camera: '📷', video: '🎬', batch: '📦' };
      const item = document.createElement('div');
      item.className = 'history-item';
      item.innerHTML = `
        <div class="hist-type-icon ${rec.detection_type || 'image'}">${typeIconMap[rec.detection_type] || '🖼️'}</div>
        <div class="hist-info">
          <div class="hist-name">${rec.filename || '未知'}</div>
          <div class="hist-meta">
            <span>${rec.timestamp || ''}</span>
            <span>${rec.detection_type === 'image' ? '图片' : rec.detection_type === 'camera' ? '摄像头' : rec.detection_type === 'video' ? '视频' : ''}</span>
            <span>${rec.inference_time || rec.processing_time ? (rec.inference_time || rec.processing_time) + 'ms' : ''}</span>
          </div>
        </div>
        <div class="hist-stats">
          ${rec.hat_count > 0 ? `<span class="hist-stat-badge badge-hat">H:${rec.hat_count}</span>` : ''}
          ${rec.nohat_count > 0 ? `<span class="hist-stat-badge badge-nohat">NH:${rec.nohat_count}</span>` : ''}
        </div>
        ${rec.has_alert ? '<div class="hist-alert-dot"></div>' : ''}
      `;
      item.addEventListener('click', () => viewHistoryRecord(rec));
      historyList.appendChild(item);
    });
  }

  function viewHistoryRecord(rec) {
    if (rec.result_image) {
      resultPlaceholder.classList.add('hidden');
      resultImage.src = apiUrl + rec.result_image;
      resultImage.classList.add('visible');
      statHat.textContent = rec.hat_count || 0;
      statNohat.textContent = rec.nohat_count || 0;
      statTotal.textContent = rec.total_count || 0;
      resultTime.textContent = rec.timestamp || '';

      if (rec.has_alert) {
        alertCount.textContent = rec.nohat_count || 0;
        alertBanner.classList.add('visible');
      } else {
        alertBanner.classList.remove('visible');
      }

      if (rec.detections && rec.detections.length > 0) {
        renderDetections(rec.detections);
      }
    }
  }

  // ===== Camera =====
  async function openCamera() {
    cameraModal.classList.add('active');
    capturedBase64 = null;
    cameraPreviewImg.style.display = 'none';
    cameraVideo.style.display = 'block';
    btnCameraDetect.classList.remove('visible');
    btnCapture.style.display = 'flex';

    try {
      cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } } });
      cameraVideo.srcObject = cameraStream;
    } catch (err) {
      showToast('无法访问摄像头：' + err.message, 'error');
      closeCamera();
    }
  }

  function capturePhoto() {
    const vw = cameraVideo.videoWidth;
    const vh = cameraVideo.videoHeight;
    cameraCanvas.width = vw;
    cameraCanvas.height = vh;
    const ctx = cameraCanvas.getContext('2d');
    ctx.drawImage(cameraVideo, 0, 0, vw, vh);
    capturedBase64 = cameraCanvas.toDataURL('image/jpeg', 0.9);

    cameraVideo.style.display = 'none';
    cameraPreviewImg.src = capturedBase64;
    cameraPreviewImg.style.display = 'block';
    btnCapture.style.display = 'none';
    btnCameraDetect.classList.add('visible');
  }

  function closeCamera() {
    cameraModal.classList.remove('active');
    if (cameraStream) {
      cameraStream.getTracks().forEach(t => t.stop());
      cameraStream = null;
    }
    cameraVideo.srcObject = null;
  }

  // ===== UI Helpers =====
  function showLoading(text) {
    loadingText.textContent = text || '正在检测中...';
    loadingOverlay.classList.add('active');
  }

  function hideLoading() {
    loadingOverlay.classList.remove('active');
  }

  function showToast(msg, type) {
    const toast = document.createElement('div');
    toast.className = `toast ${type || 'info'}`;
    toast.textContent = msg;
    toastContainer.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  // ===== Start =====
  init();
})();
</script>
</body>
</html>
